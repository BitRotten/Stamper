<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 380px; padding: 10px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    h2 { margin-top: 0; font-size: 16px; color: #333; }
    .btn { cursor: pointer; padding: 8px 12px; margin: 2px 0; border: none; border-radius: 4px; background-color: #007bff; color: white; font-weight: bold; }
    .btn:hover { background-color: #0056b3; }
    #copy-all-btn { background-color: #28a745; }
    #copy-all-btn:hover { background-color: #1e7e34; }
    .header-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
    
    .timestamp-item { display: flex; align-items: center; margin-bottom: 8px; gap: 5px; background: #f8f9fa; padding: 5px; border-radius: 4px; border: 1px solid #ddd; }
    .time-display { font-weight: bold; font-family: monospace; width: 65px; font-size: 14px;}
    .note-input { flex-grow: 1; padding: 4px; border: 1px solid #ccc; border-radius: 3px; }
    .tune-btn { cursor: pointer; padding: 2px 6px; background: #e2e6ea; border: 1px solid #dae0e5; border-radius: 3px; font-weight: bold;}
    .tune-btn:hover { background: #d3d9df; }
    .delete-btn { cursor: pointer; padding: 2px 6px; background: #dc3545; color: white; border: none; border-radius: 3px; }
  </style>
</head>
<body>
  <h2>Livestream Stamper</h2>
  <div class="header-buttons">
    <button id="capture-btn" class="btn">Capture Timestamp</button>
    <button id="copy-all-btn" class="btn">Copy for Comments</button>
  </div>

  <div id="timestamp-list"></div>

  <script src="popup.js"></script>
</body>
</html>
